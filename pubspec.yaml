name: hearth_app
description: Hearth companion app — WhatsApp-as-IdP auth, chat, wiki, dashboard, and background signals.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # Deep link handling — captures hearth://auth?token=...&refresh=...
  app_links: ^6.0.0

  # Secure token storage — iOS Keychain, Android Keystore
  flutter_secure_storage: ^9.0.0

  # Background service — keeps signal monitoring alive

  # GPS geofencing
  geolocator: ^13.0.0

  # WiFi SSID detection
  network_info_plus: ^6.0.0

  # Local storage (geofence config, cached shopping list — non-sensitive only)
  shared_preferences: ^2.3.0

  # Markdown rendering (wiki screen)
  flutter_markdown_plus: ^1.0.7

  # Open WhatsApp deep link on login
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8
  native_geofence: ^1.2.2
  flutter_local_notifications: ^18.0.1

  # Map for geofence picker and visualization
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: assets/icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
