name: Build APK

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Read version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "full=${VERSION}+${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/hearth.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/hearth.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: hearth
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: flutter build apk --release --target-platform android-arm64 --split-debug-info=build/debug-info --build-number=${{ github.run_number }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.full }}
          name: v${{ steps.version.outputs.full }}
          body: ${{ github.event.head_commit.message }}
          files: build/app/outputs/flutter-apk/app-release.apk
          make_latest: true
